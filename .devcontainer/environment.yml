# ML Conda Environment
# CPU-only version for testing on Predator dataset
# Usage: conda env create -f environment_ml.yml
# NOTE: opencv-python is pinned to 4.9.0.80 to match the pybind modules
#       which were compiled against OpenCV 4.9.0 from source

name: ml
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - numpy<2
  - scipy
  - tqdm
  - matplotlib
  - ipython
  - pyyaml
  - h5py
  - scikit-learn
  - open3d>=0.16.0
  - pip
  - pip:
      - numpy<2
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==2.10.0+cpu
      - torchvision==0.25.0+cpu
      - torchaudio==2.10.0+cpu
      - transforms3d
      - easydict
      - opencv-python==4.9.0.80
      - ipdb
      - einops
      - nibabel
      - h5py
      - tensorboard
      - tensorboardX
      - coloredlogs
      - asrl-pyboreas
